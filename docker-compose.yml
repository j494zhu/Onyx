services:
  web:
    build: .
    container_name: onyx_web
    ports:
      # Bind to localhost only; Nginx on the host reverse-proxies to this.
      - "127.0.0.1:5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env  
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-onyx}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-onyx}
      # Override the default Redis connection string so Flask reaches Redis over
      # the Compose network. The password is embedded in the URL because the app
      # only reads REDIS_URL (REDIS_PASSWORD alone is ignored by the app).
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0

  postgres:
    image: postgres:16-alpine
    container_name: onyx_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-onyx}
      - POSTGRES_USER=${POSTGRES_USER:-onyx}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onyx} -d ${POSTGRES_DB:-onyx}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    container_name: onyx_redis
    restart: unless-stopped
    # Require a password for every connection (defense in depth). The value is
    # interpolated from .env (${REDIS_PASSWORD}) at compose parse time.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No host port mapping: the web container reaches Redis over the Compose
    # network (redis:6379). Not exposed to the host or the public internet,
    # which also avoids clashing with any Redis already running on the host.
    volumes:
      - redis_data:/data  # permenant redis data

volumes:
  redis_data:
  postgres_data: